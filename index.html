<!DOCTYPE html>
<html>
<head>
  <title>Viklap Shayari</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-top: 50px;
      color: #ff4d4d;
      text-shadow: 0 0 10px red;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px red; }
      to { text-shadow: 0 0 20px red; }
    }

    .shayari {
      margin: 30px auto;
      width: 80%;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
      font-size: 20px;
      transition: 0.3s;
    }

    .shayari:hover {
      transform: scale(1.05);
      background: rgba(255,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

  <h1>🔥 VIKLAP SHAYARI 🔥</h1>

  <div class="shayari" id="text">
    Ek alag kahani johar koi apna likhta hai
  </div>

  <button onclick="newShayari()">New Shayari</button>

  <script>
    const shayariList = [
      "Ek alag kahani johar koi apna likhta hai",
      "Sabr ka phal meetha hota hai",
      "Jo mila hai usi mein khush rehna seekh lo",
      "Zindagi ek jung hai, ladna seekh lo",
      "Apni pehchan khud banao"
    ];

    function newShayari() {
      let random = Math.floor(Math.random() * shayariList.length);
      document.getElementById("text").innerText = shayariList[random];
    }
  </script>

</body>
</html>
