<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .search {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        .search input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 300px;
        }
        .search button {
            padding: 10px;
            margin-left: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <title>Viklap Shayari</title>
</head>
<body>
    <div class="glass">
        <h1>Welcome to Viklap Shayari</h1>
        <div class="search">
            <input type="text" placeholder="Search...">
            <button>Search</button>
        </div>
        <p>This is an example of a glass morphism design with search functionality.</p>
    </div>
</body>
</html>
