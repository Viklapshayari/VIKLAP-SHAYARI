        html {

            width: 100%;

            z-index: -1;

        /* Header */
        header {
            width: 100%;
            padding: 20px;

            animation: slideDown 0.6s ease-out;

            from {

            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(32px, 8vw, 48px);

            margin-bottom: 10px;

        .subtitle {
            font-size: 14px;
            opacity: 0.8;

        }

        /* Search Section */
        .search-section {
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            outline: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box input:focus {
            border-color: #ff4d6d;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
        }

        .search-icon {
            font-size: 18px;
            opacity: 0.7;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 700px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            animation: slideUp 0.8s ease-out 0.4s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass Card */
        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.6s;
            z-index: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.3), 
                        0 0 30px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card:hover::before {
            left: 100%;
        }

        .shayari-number {
